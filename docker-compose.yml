version: '3'
services:
  app:
    container_name: ty
    build: .
    working_dir: /code
    ports:
      - 3000:3000
      - 3001:3001
    volumes:
      - .:/code
    tty: true
    depends_on:
      - db
  db:
    image: postgres:14.1
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    ports:
      - 5432:5432
